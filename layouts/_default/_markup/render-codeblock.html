{{- if eq .Type "mermaid" -}}
  {{- .Page.Store.Set "hasMermaid" true -}}
  <div class="mermaid">
    {{- .Inner | safeHTML -}}
  </div>
{{- else -}}
  <div class="highlight"><pre tabindex="0" class="chroma"><code class="language-{{ .Type }}" data-lang="{{ .Type }}">{{ .Inner }}</code></pre></div>
{{- end -}}
