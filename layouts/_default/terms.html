{{ define "main" }}

<div data-pagefind-ignore>

<div class="max-w-4xl mx-auto px-4">
  <h1 class="text-4xl font-bold text-center my-8 dark:text-white">{{ .Title }}</h1>
  {{ .Content }}

  <!-- Word Cloud Container -->
  <div id="tag-cloud" style="width:100%; height:500px; margin:2rem 0;"></div>

  <!-- Fallback tag list (hidden when JS works) -->
  <noscript>
  <div class="flex flex-row gap-3 flex-wrap justify-center my-8">
    {{- $type := .Type }}
    {{- range $key, $value := .Data.Terms.Alphabetical }}
      {{- $name := .Name }}
      {{- $count := .Count }}
      {{- with site.GetPage (printf "/%s/%s" $type $name) }}
        <a href="{{ .RelPermalink }}" class="tag-pill">{{ .Title }} ({{ $count }})</a>
      {{- end }}
    {{- end }}
  </div>
  </noscript>
</div>

<!-- D3 + d3-cloud -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/jasondavies/d3-cloud/build/d3.layout.cloud.js"></script>
<script>
(function() {
  var words = [
    {{- $type := .Type }}
    {{- range $key, $value := .Data.Terms.Alphabetical }}
      {{- $name := .Name }}
      {{- $count := .Count }}
      {{- with site.GetPage (printf "/%s/%s" $type $name) }}
        { text: "{{ .Title | safeJS }}", size: {{ $count }}, url: "{{ .RelPermalink | safeJS }}" },
      {{- end }}
    {{- end }}
  ];

  var container = document.getElementById('tag-cloud');
  var width = container.offsetWidth;
  var height = 500;

  // Scale: map count to font size
  var maxCount = d3.max(words, function(d) { return d.size; }) || 1;
  var fontScale = d3.scaleLinear()
    .domain([1, maxCount])
    .range([18, 64]);

  // Color palette
  var colors = ['#6366f1','#8b5cf6','#a855f7','#3b82f6','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#14b8a6'];

  var layout = d3.layout.cloud()
    .size([width, height])
    .words(words.map(function(d) {
      return { text: d.text, size: fontScale(d.size), url: d.url, count: d.size };
    }))
    .padding(8)
    .rotate(function() { return (~~(Math.random() * 3) - 1) * 15; })
    .font("'PingFang SC', 'Microsoft YaHei', Arial, sans-serif")
    .fontSize(function(d) { return d.size; })
    .on("end", draw);

  layout.start();

  function draw(words) {
    var svg = d3.select("#tag-cloud").append("svg")
      .attr("width", width)
      .attr("height", height)
      .append("g")
      .attr("transform", "translate(" + width/2 + "," + height/2 + ")");

    var tooltip = d3.select("body").append("div")
      .style("position", "absolute")
      .style("background", "rgba(0,0,0,0.8)")
      .style("color", "#fff")
      .style("padding", "4px 10px")
      .style("border-radius", "6px")
      .style("font-size", "13px")
      .style("pointer-events", "none")
      .style("opacity", 0)
      .style("z-index", 1000);

    svg.selectAll("text")
      .data(words)
      .enter().append("text")
      .style("font-size", function(d) { return d.size + "px"; })
      .style("font-family", "'PingFang SC', 'Microsoft YaHei', Arial, sans-serif")
      .style("font-weight", function(d) { return d.size > 40 ? "800" : "600"; })
      .style("fill", function(d, i) { return colors[i % colors.length]; })
      .style("cursor", "pointer")
      .style("transition", "opacity 0.2s ease")
      .attr("text-anchor", "middle")
      .attr("transform", function(d) {
        return "translate(" + [d.x, d.y] + ")rotate(" + d.rotate + ")";
      })
      .text(function(d) { return d.text; })
      .on("click", function(event, d) {
        window.location.href = d.url;
      })
      .on("mouseover", function(event, d) {
        d3.select(this).style("opacity", 0.7);
        tooltip.style("opacity", 1)
          .html(d.text + " (" + d.count + " 篇)")
          .style("left", (event.pageX + 12) + "px")
          .style("top", (event.pageY - 30) + "px");
      })
      .on("mouseout", function() {
        d3.select(this).style("opacity", 1);
        tooltip.style("opacity", 0);
      });
  }
})();
</script>

</div>

{{- end -}}
