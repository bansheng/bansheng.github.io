<!-- Mermaid.js for Flowchart Rendering -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  // Store original source before first render so theme switch can re-render
  function saveMermaidSources() {
    document.querySelectorAll('.mermaid').forEach(el => {
      if (!el.dataset.originalSource) {
        el.dataset.originalSource = el.innerHTML;
      }
    });
  }

  // Restore original source and clear data-processed so mermaid.run() re-renders
  function resetMermaidElements() {
    document.querySelectorAll('.mermaid').forEach(el => {
      if (el.dataset.originalSource) {
        el.innerHTML = el.dataset.originalSource;
      }
      delete el.dataset.processed;
    });
  }

  function initMermaid() {
    try {
      const isDarkMode = document.documentElement.classList.contains('dark') ||
                         window.matchMedia('(prefers-color-scheme: dark)').matches;

      mermaid.initialize({
        startOnLoad: false,
        theme: 'base',
        securityLevel: 'loose',
        logLevel: 'error',
        fontFamily: '"PingFang SC", "Lantinghei SC", "Microsoft YaHei", sans-serif',
        themeVariables: isDarkMode ? {
          fontSize: '13px',
          primaryColor: '#1e3a5f',
          primaryTextColor: '#e2e8f0',
          primaryBorderColor: '#3b82f6',
          secondaryColor: '#312e81',
          tertiaryColor: '#1e293b',
          lineColor: '#64748b',
          textColor: '#e2e8f0',
          mainBkg: '#1e3a5f',
          nodeBorder: '#3b82f6',
          clusterBkg: '#0f172a',
          clusterBorder: '#334155',
          edgeLabelBackground: '#1e293b'
        } : {
          fontSize: '13px',
          primaryColor: '#dbeafe',
          primaryTextColor: '#1e293b',
          primaryBorderColor: '#3b82f6',
          secondaryColor: '#ede9fe',
          tertiaryColor: '#f0fdf4',
          lineColor: '#64748b',
          textColor: '#1e293b',
          mainBkg: '#dbeafe',
          nodeBorder: '#3b82f6',
          clusterBkg: '#f8fafc',
          clusterBorder: '#cbd5e1',
          edgeLabelBackground: '#ffffff'
        },
        flowchart: {
          nodeSpacing: 15,
          rankSpacing: 25,
          padding: 6,
          useMaxWidth: false,
          htmlLabels: true
        }
      });

      // Restore original source before re-rendering (fixes theme switch)
      resetMermaidElements();

      const renderWithRetry = (retryCount = 0) => {
        mermaid.run({
          querySelector: '.mermaid'
        }).then(() => {
          console.log('[Mermaid] Charts rendered successfully');
        }).catch(err => {
          console.error(`[Mermaid] Rendering failed (Retry ${retryCount}):`, err);
          if (retryCount < 2) {
            setTimeout(() => renderWithRetry(retryCount + 1), 500);
          }
        });
      };

      renderWithRetry();
    } catch (e) {
      console.error('[Mermaid] Initialization error:', e);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      saveMermaidSources();
      initMermaid();
    });
  } else {
    saveMermaidSources();
    initMermaid();
  }

  const observer = new MutationObserver((mutations) => {
    mutations.forEach((mutation) => {
      if (mutation.type === 'attributes') {
        initMermaid();
      }
    });
  });
  observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
</script>

<!-- MathJax Support -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    }
  };
</script>
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>

<!-- Giscus Comments -->
{{ if .IsPage }}
{{ $giscus := site.Params.hugoblox.comments.giscus }}
{{ if $giscus }}
<div class="giscus-wrapper" style="max-width: 800px; margin: 2rem auto; padding: 0 1rem;">
    <script src="https://giscus.app/client.js"
        data-repo="{{ $giscus.repo }}"
        data-repo-id="{{ $giscus.repoId }}"
        data-category="{{ $giscus.category }}"
        data-category-id="{{ $giscus.categoryId }}"
        data-mapping="{{ $giscus.mapping }}"
        data-strict="{{ $giscus.strict }}"
        data-reactions-enabled="{{ $giscus.reactionsEnabled }}"
        data-emit-metadata="{{ $giscus.emitMetadata }}"
        data-input-position="{{ $giscus.inputPosition }}"
        data-theme="{{ $giscus.theme }}"
        data-lang="{{ $giscus.lang }}"
        data-loading="{{ $giscus.loading }}"
        crossorigin="anonymous"
        async>
    </script>
</div>
{{ end }}
{{ end }}
