{{- define "main" }}
<header class="header">
    <h1>{{ .Title }}</h1>
</header>

{{- $tagsData := slice }}
{{- range $name, $taxonomy := .Site.Taxonomies.tags }}
    {{- $tagUrl := printf "/tags/%s" ($name | urlize) | relLangURL }}
    {{- $tagsData = $tagsData | append (dict "text" $name "size" (len $taxonomy) "url" $tagUrl) }}
{{- end }}

<div class="tags-cloud-container">
    <div id="word-cloud" data-tags="{{ $tagsData | jsonify }}"></div>
    <div class="tag-tooltip" id="tag-tooltip"></div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/jasondavies/d3-cloud/build/d3.layout.cloud.js"></script>

<script>
    (function() {
        const container = document.getElementById('word-cloud');
        const tooltip = document.getElementById('tag-tooltip');
        
        if (!container || !container.dataset.tags) return;
        
        const tags = JSON.parse(container.dataset.tags);
        if (tags.length === 0) return;

        function drawCloud() {
            const width = container.offsetWidth;
            const height = container.offsetHeight || 400;

            // 清除旧内容
            d3.select("#word-cloud").selectAll("*").remove();

            const maxSize = d3.max(tags, d => d.size);
            const minSize = d3.min(tags, d => d.size);
            
            // 字体大小映射：最小 16px，最大 60px
            const fontSizeScale = d3.scaleLinear()
                .domain([minSize, maxSize])
                .range([16, 60]);

            const layout = d3.layout.cloud()
                .size([width, height])
                .words(tags.map(d => ({ ...d })))
                .padding(5)
                .rotate(() => (~~(Math.random() * 2) * 90)) // 随机 0 或 90 度
                .font("PingFang SC, Lantinghei SC, Microsoft YaHei, sans-serif")
                .fontSize(d => fontSizeScale(d.size))
                .on("end", draw);

            layout.start();

            function draw(words) {
                const isDarkMode = document.documentElement.getAttribute('data-theme') === 'dark';
                const colorScale = isDarkMode 
                    ? d3.scaleOrdinal(d3.schemePastel1) 
                    : d3.scaleOrdinal(d3.schemeCategory10);

                const svg = d3.select("#word-cloud").append("svg")
                    .attr("width", layout.size()[0])
                    .attr("height", layout.size()[1])
                    .append("g")
                    .attr("transform", "translate(" + layout.size()[0] / 2 + "," + layout.size()[1] / 2 + ")");

                const text = svg.selectAll("text")
                    .data(words)
                    .enter().append("text")
                    .style("font-size", d => d.size + "px")
                    .style("font-family", "PingFang SC, Lantinghei SC, Microsoft YaHei, sans-serif")
                    .style("font-weight", "bold")
                    .style("fill", (d, i) => colorScale(i))
                    .attr("text-anchor", "middle")
                    .attr("transform", d => "translate(" + [d.x, d.y] + ")rotate(" + d.rotate + ")")
                    .text(d => d.text)
                    .style("cursor", "pointer")
                    .on("mouseover", function(event, d) {
                        d3.select(this).transition().duration(200).style("opacity", 0.7).attr("font-size", (d.size * 1.1) + "px");
                        tooltip.style("opacity", 1)
                            .html(`${d.text}: ${d.size} 篇文章`)
                            .style("left", (event.pageX - (container.getBoundingClientRect().left + window.scrollX) + 10) + "px")
                            .style("top", (event.pageY - (container.getBoundingClientRect().top + window.scrollY) - 30) + "px");
                    })
                    .on("mousemove", function(event) {
                        tooltip.style("left", (event.pageX - (container.getBoundingClientRect().left + window.scrollX) + 10) + "px")
                            .style("top", (event.pageY - (container.getBoundingClientRect().top + window.scrollY) - 30) + "px");
                    })
                    .on("mouseout", function(event, d) {
                        d3.select(this).transition().duration(200).style("opacity", 1).attr("font-size", d.size + "px");
                        tooltip.style("opacity", 0);
                    })
                    .on("click", function(event, d) {
                        window.location.href = d.url;
                    });
            }
        }

        // 初始绘制
        drawCloud();

        // 窗口缩放时重绘
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(drawCloud, 300);
        });

        // 主题切换时重绘
        const themeBtn = document.getElementById('theme-toggle');
        if (themeBtn) {
            themeBtn.addEventListener('click', () => {
                setTimeout(drawCloud, 500); // 等待主题变量更新
            });
        }
    })();
</script>

<style>
.header {
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid var(--primary);
}
</style>
{{- end }}
