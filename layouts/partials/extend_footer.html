<!-- Mermaid.js for Flowchart Rendering -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs';
  
  function initMermaid() {
    try {
      // 动态检测当前主题模式并初始化 mermaid
      const isDarkMode = document.documentElement.getAttribute('data-theme') === 'dark' || 
                         (!document.documentElement.getAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
      
      mermaid.initialize({ 
        startOnLoad: false, 
        theme: isDarkMode ? 'dark' : 'neutral',
        securityLevel: 'loose',
        logLevel: 'error',
        fontFamily: '"PingFang SC", "Lantinghei SC", "Microsoft YaHei", sans-serif'
      });
      
      // 显式运行 mermaid 渲染，增加重试机制和错误日志
      const renderWithRetry = (retryCount = 0) => {
        mermaid.run({
          querySelector: '.mermaid'
        }).then(() => {
          console.log('[Mermaid] Charts rendered successfully');
        }).catch(err => {
          console.error(`[Mermaid] Rendering failed (Retry ${retryCount}):`, err);
          if (retryCount < 2) {
            setTimeout(() => renderWithRetry(retryCount + 1), 500);
          }
        });
      };

      renderWithRetry();

    } catch (e) {
      console.error('[Mermaid] Initialization error:', e);
    }
  }

  // 确保在 DOM 加载完成后运行
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMermaid);
  } else {
    initMermaid();
  }

  // 监听主题切换，重新渲染
  const observer = new MutationObserver((mutations) => {
    mutations.forEach((mutation) => {
      if (mutation.type === 'attributes' && mutation.attributeName === 'data-theme') {
        initMermaid();
      }
    });
  });
  observer.observe(document.documentElement, { attributes: true });
</script>

<!-- MathJax Support for Math Formulas -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    }
  };
</script>
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>

<!-- Highlight.js Support -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hl-light">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', (event) => {
    document.querySelectorAll('pre code').forEach((block) => {
      hljs.highlightElement(block);
    });
  });
</script>
