<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <defs>
    <style>
      text { font-family: 'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E293B">缩放定律对比：ΔAUCvs. 参数量 &amp; FLOPs</text>
  <text x="450" y="46" text-anchor="middle" font-size="12" fill="#64748B">ΔAUC = a · Params^α，α 越大缩放效率越高（x 轴对数坐标）</text>

  <!-- ===== LEFT PANEL: ΔAUC vs. Parameters ===== -->
  <rect x="30" y="58" width="400" height="360" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="230" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">ΔAUC vs. 参数量</text>

  <!-- Y axis -->
  <line x1="90" y1="90" x2="90" y2="370" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- X axis -->
  <line x1="90" y1="370" x2="400" y2="370" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Y axis label -->
  <text x="58" y="235" text-anchor="middle" font-size="11" fill="#475569" transform="rotate(-90, 58, 235)">ΔAUC (%)</text>
  <!-- X axis label -->
  <text x="245" y="395" text-anchor="middle" font-size="11" fill="#475569">参数量 (对数坐标)</text>

  <!-- Y axis ticks -->
  <line x1="85" y1="340" x2="90" y2="340" stroke="#94A3B8" stroke-width="1"/>
  <text x="80" y="344" text-anchor="end" font-size="10" fill="#64748B">0.2</text>
  <line x1="85" y1="300" x2="90" y2="300" stroke="#94A3B8" stroke-width="1"/>
  <text x="80" y="304" text-anchor="end" font-size="10" fill="#64748B">0.4</text>
  <line x1="85" y1="260" x2="90" y2="260" stroke="#94A3B8" stroke-width="1"/>
  <text x="80" y="264" text-anchor="end" font-size="10" fill="#64748B">0.6</text>
  <line x1="85" y1="220" x2="90" y2="220" stroke="#94A3B8" stroke-width="1"/>
  <text x="80" y="224" text-anchor="end" font-size="10" fill="#64748B">0.8</text>
  <line x1="85" y1="180" x2="90" y2="180" stroke="#94A3B8" stroke-width="1"/>
  <text x="80" y="184" text-anchor="end" font-size="10" fill="#64748B">1.0</text>
  <line x1="85" y1="140" x2="90" y2="140" stroke="#94A3B8" stroke-width="1"/>
  <text x="80" y="144" text-anchor="end" font-size="10" fill="#64748B">1.2</text>

  <!-- X axis ticks (log scale: ~50M, ~70M, ~100M, ~135M) -->
  <line x1="130" y1="370" x2="130" y2="375" stroke="#94A3B8" stroke-width="1"/>
  <text x="130" y="385" text-anchor="middle" font-size="9" fill="#64748B">50M</text>
  <line x1="180" y1="370" x2="180" y2="375" stroke="#94A3B8" stroke-width="1"/>
  <text x="180" y="385" text-anchor="middle" font-size="9" fill="#64748B">70M</text>
  <line x1="240" y1="370" x2="240" y2="375" stroke="#94A3B8" stroke-width="1"/>
  <text x="240" y="385" text-anchor="middle" font-size="9" fill="#64748B">100M</text>
  <line x1="320" y1="370" x2="320" y2="375" stroke="#94A3B8" stroke-width="1"/>
  <text x="320" y="385" text-anchor="middle" font-size="9" fill="#64748B">135M</text>

  <!-- Grid lines -->
  <line x1="90" y1="340" x2="390" y2="340" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="90" y1="300" x2="390" y2="300" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="90" y1="260" x2="390" y2="260" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="90" y1="220" x2="390" y2="220" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="90" y1="180" x2="390" y2="180" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="90" y1="140" x2="390" y2="140" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Data points and curves:
       RankMixer: α=0.116 → flatter curve, points ~(135M, 0.475%) → x=320, y=342
       UniMixer-2B: α=0.132 → medium, points ~(101M, 0.566%) → x=243, y=330; (135M data extrapolated)
       UniMixer-Lite-2B: α=0.142 → steepest, points ~(76M, 0.682%) → x=195, y=320; (84M, 0.814%)→x=210,y=308
  -->

  <!-- RankMixer curve (α=0.116, red/orange) -->
  <!-- Points: (50M→x=130,y≈360), (76M→x=195,y≈352), (101M→x=243,y≈347), (135M→x=320,y≈342) -->
  <polyline points="130,362 195,353 243,347 320,342" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="130" cy="362" r="4" fill="#EF4444"/>
  <circle cx="243" cy="347" r="4" fill="#EF4444"/>
  <circle cx="320" cy="342" r="5" fill="#EF4444"/>

  <!-- UniMixer-2B curve (α=0.132, green) -->
  <!-- Points: (50M→x=130,y≈352), (76M→x=195,y≈340), (101M→x=243,y≈332) -->
  <polyline points="130,356 195,342 243,332 310,326" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="130" cy="356" r="4" fill="#10B981"/>
  <circle cx="243" cy="332" r="5" fill="#10B981"/>

  <!-- UniMixer-Lite curve (α=0.142, blue - steepest) -->
  <!-- Points: (50M→x=130,y≈346), (76M→x=195,y≈330), (84M→x=210,y≈324) -->
  <polyline points="130,350 180,334 210,324 260,314 330,305" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="130" cy="350" r="4" fill="#2563EB"/>
  <circle cx="180" cy="334" r="4" fill="#2563EB"/>
  <circle cx="210" cy="324" r="5" fill="#2563EB"/>

  <!-- Data point labels -->
  <text x="324" y="337" font-size="9" fill="#EF4444">+0.475%</text>
  <text x="247" y="327" font-size="9" fill="#10B981">+0.566%</text>
  <text x="214" y="319" font-size="9" fill="#2563EB">+0.814%</text>

  <!-- Legend (left panel) -->
  <line x1="100" y1="116" x2="126" y2="116" stroke="#EF4444" stroke-width="2.5"/>
  <circle cx="113" cy="116" r="3.5" fill="#EF4444"/>
  <text x="130" y="120" font-size="10" fill="#475569">RankMixer (α=0.116)</text>

  <line x1="100" y1="132" x2="126" y2="132" stroke="#10B981" stroke-width="2.5"/>
  <circle cx="113" cy="132" r="3.5" fill="#10B981"/>
  <text x="130" y="136" font-size="10" fill="#475569">UniMixer-2B (α=0.132)</text>

  <line x1="100" y1="148" x2="126" y2="148" stroke="#2563EB" stroke-width="2.5"/>
  <circle cx="113" cy="148" r="3.5" fill="#2563EB"/>
  <text x="130" y="152" font-size="10" fill="#475569">UniMixer-Lite-2B (α=0.142)</text>

  <!-- ===== RIGHT PANEL: ΔAUC vs. FLOPs ===== -->
  <rect x="460" y="58" width="415" height="360" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="667" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">ΔAUC vs. FLOPs</text>

  <!-- Y axis -->
  <line x1="520" y1="90" x2="520" y2="370" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- X axis -->
  <line x1="520" y1="370" x2="840" y2="370" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Y axis label -->
  <text x="488" y="235" text-anchor="middle" font-size="11" fill="#475569" transform="rotate(-90, 488, 235)">ΔAUC (%)</text>
  <!-- X axis label -->
  <text x="680" y="395" text-anchor="middle" font-size="11" fill="#475569">FLOPs (对数坐标)</text>

  <!-- Y axis ticks -->
  <line x1="515" y1="340" x2="520" y2="340" stroke="#94A3B8" stroke-width="1"/>
  <text x="510" y="344" text-anchor="end" font-size="10" fill="#64748B">0.2</text>
  <line x1="515" y1="300" x2="520" y2="300" stroke="#94A3B8" stroke-width="1"/>
  <text x="510" y="304" text-anchor="end" font-size="10" fill="#64748B">0.4</text>
  <line x1="515" y1="260" x2="520" y2="260" stroke="#94A3B8" stroke-width="1"/>
  <text x="510" y="264" text-anchor="end" font-size="10" fill="#64748B">0.6</text>
  <line x1="515" y1="220" x2="520" y2="220" stroke="#94A3B8" stroke-width="1"/>
  <text x="510" y="224" text-anchor="end" font-size="10" fill="#64748B">0.8</text>
  <line x1="515" y1="180" x2="520" y2="180" stroke="#94A3B8" stroke-width="1"/>
  <text x="510" y="184" text-anchor="end" font-size="10" fill="#64748B">1.0</text>

  <!-- X axis ticks (log scale: 1.68T, 2.50T, 2.60T, 4.24T) -->
  <line x1="560" y1="370" x2="560" y2="375" stroke="#94A3B8" stroke-width="1"/>
  <text x="560" y="386" text-anchor="middle" font-size="9" fill="#64748B">1.0T</text>
  <line x1="640" y1="370" x2="640" y2="375" stroke="#94A3B8" stroke-width="1"/>
  <text x="640" y="386" text-anchor="middle" font-size="9" fill="#64748B">1.68T</text>
  <line x1="720" y1="370" x2="720" y2="375" stroke="#94A3B8" stroke-width="1"/>
  <text x="720" y="386" text-anchor="middle" font-size="9" fill="#64748B">2.5T</text>
  <line x1="780" y1="370" x2="780" y2="375" stroke="#94A3B8" stroke-width="1"/>
  <text x="780" y="386" text-anchor="middle" font-size="9" fill="#64748B">4.24T</text>

  <!-- Grid lines -->
  <line x1="520" y1="340" x2="830" y2="340" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="520" y1="300" x2="830" y2="300" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="520" y1="260" x2="830" y2="260" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="520" y1="220" x2="830" y2="220" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="520" y1="180" x2="830" y2="180" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- RankMixer (1.68T→x=640, ΔAUC=0.475%→y=342) - mostly flat vs FLOPs -->
  <polyline points="560,356 640,342 750,336" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="640" cy="342" r="5" fill="#EF4444"/>

  <!-- UniMixer-2B (2.5T→x=720, ΔAUC=0.566%→y=330) -->
  <polyline points="560,350 640,338 720,330 760,326" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="720" cy="330" r="5" fill="#10B981"/>

  <!-- UniMixer-Lite (2.6T→x=724, ΔAUC=0.682%→y=320; 4.24T→x=780, ΔAUC=0.814%→y=308) -->
  <polyline points="560,342 640,328 724,318 780,308" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="724" cy="318" r="4" fill="#2563EB"/>
  <circle cx="780" cy="308" r="5" fill="#2563EB"/>

  <!-- Data labels -->
  <text x="644" y="337" font-size="9" fill="#EF4444">+0.475%</text>
  <text x="724" y="325" font-size="9" fill="#10B981">+0.566%</text>
  <text x="726" y="313" font-size="9" fill="#2563EB">+0.682%</text>
  <text x="784" y="303" font-size="9" fill="#2563EB">+0.814%</text>

  <!-- Legend (right panel) -->
  <line x1="530" y1="116" x2="556" y2="116" stroke="#EF4444" stroke-width="2.5"/>
  <circle cx="543" cy="116" r="3.5" fill="#EF4444"/>
  <text x="560" y="120" font-size="10" fill="#475569">RankMixer</text>
  <line x1="530" y1="132" x2="556" y2="132" stroke="#10B981" stroke-width="2.5"/>
  <circle cx="543" cy="132" r="3.5" fill="#10B981"/>
  <text x="560" y="136" font-size="10" fill="#475569">UniMixer-2B</text>
  <line x1="530" y1="148" x2="556" y2="148" stroke="#2563EB" stroke-width="2.5"/>
  <circle cx="543" cy="148" r="3.5" fill="#2563EB"/>
  <text x="560" y="152" font-size="10" fill="#475569">UniMixer-Lite</text>

  <!-- ===== Bottom summary ===== -->
  <rect x="30" y="428" width="840" height="46" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="450" y="447" text-anchor="middle" font-size="12" font-weight="bold" fill="#1D4ED8">核心结论</text>
  <text x="450" y="465" text-anchor="middle" font-size="11" fill="#1E293B">UniMixer-Lite 缩放指数 α=0.142，比 RankMixer（0.116）高出 22.3%——参数量翻倍时，额外 AUC 增益多 1.9ppt</text>
</svg>
