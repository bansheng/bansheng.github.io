<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="540" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1E293B">FuXi-Linear 三通道并行架构</text>
  <text x="430" y="56" text-anchor="middle" font-size="12" fill="#64748B">Three-Channel Parallel Architecture with Gated Fusion</text>

  <!-- ===== INPUT BOX ===== -->
  <rect x="290" y="75" width="280" height="52" rx="8" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="430" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#4338CA">用户历史交互序列</text>
  <text x="430" y="114" text-anchor="middle" font-size="11" fill="#4338CA">User Behavior Sequence + 时间戳</text>

  <!-- Arrow down to Embedding -->
  <line x1="430" y1="127" x2="430" y2="150" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Embedding box -->
  <rect x="330" y="150" width="200" height="38" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="430" y="164" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4ED8">Embedding 层</text>
  <text x="430" y="180" text-anchor="middle" font-size="10" fill="#1D4ED8">Item Embedding + Time Encoding</text>

  <!-- Arrow from Embedding split to 3 channels -->
  <!-- Central vertical line down from embedding -->
  <line x1="430" y1="188" x2="430" y2="210" stroke="#64748B" stroke-width="1.5"/>
  <!-- Horizontal distributor -->
  <line x1="155" y1="210" x2="705" y2="210" stroke="#64748B" stroke-width="1.5"/>
  <!-- Three down arrows -->
  <line x1="155" y1="210" x2="155" y2="236" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="430" y1="210" x2="430" y2="236" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="705" y1="210" x2="705" y2="236" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- ===== CHANNEL 1: Retention (Semantic) ===== -->
  <rect x="44" y="237" width="222" height="130" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="155" y="258" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4ED8">语义保留通道</text>
  <text x="155" y="274" text-anchor="middle" font-size="10" fill="#3B82F6">Retention Channel</text>
  <!-- Inner details -->
  <rect x="58" y="282" width="194" height="28" rx="5" fill="#BFDBFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="155" y="296" text-anchor="middle" font-size="10" fill="#1E40AF">Q, K, V ← 物品语义特征</text>
  <text x="155" y="308" text-anchor="middle" font-size="10" fill="#1E40AF">Item Semantic Features</text>
  <rect x="58" y="316" width="194" height="28" rx="5" fill="#BFDBFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="155" y="327" text-anchor="middle" font-size="10" fill="#1E40AF">Retention(Q,K,V,D) = (QKᵀ⊙D)V</text>
  <text x="155" y="340" text-anchor="middle" font-size="10" fill="#1E40AF">衰减矩阵 γⁱ⁻ʲ，多尺度多头</text>

  <!-- Train/Infer mode labels -->
  <text x="155" y="360" text-anchor="middle" font-size="10" fill="#2563EB">训练: O(n) 并行 | 推理: O(1) 递归</text>

  <!-- ===== CHANNEL 2: Linear Positional ===== -->
  <rect x="319" y="237" width="222" height="130" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="430" y="258" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">线性位置通道</text>
  <text x="430" y="274" text-anchor="middle" font-size="10" fill="#10B981">Linear Positional Channel</text>
  <rect x="333" y="282" width="194" height="28" rx="5" fill="#A7F3D0" stroke="#6EE7B7" stroke-width="1"/>
  <text x="430" y="296" text-anchor="middle" font-size="10" fill="#065F46">位置差函数核函数近似</text>
  <text x="430" y="308" text-anchor="middle" font-size="10" fill="#065F46">f(x-y) ≈ k(x)ᵀk(y)</text>
  <rect x="333" y="316" width="194" height="28" rx="5" fill="#A7F3D0" stroke="#6EE7B7" stroke-width="1"/>
  <text x="430" y="327" text-anchor="middle" font-size="10" fill="#065F46">MLP 核函数映射位置索引</text>
  <text x="430" y="340" text-anchor="middle" font-size="10" fill="#065F46">兼容线性递归，近似精确 RPE</text>
  <text x="430" y="360" text-anchor="middle" font-size="10" fill="#10B981">解决线性复杂度与位置编码不兼容</text>

  <!-- ===== CHANNEL 3: Temporal Retention ===== -->
  <rect x="594" y="237" width="222" height="130" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="705" y="258" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">时序保留通道</text>
  <text x="705" y="274" text-anchor="middle" font-size="10" fill="#F59E0B">Temporal Retention Channel</text>
  <rect x="608" y="282" width="194" height="28" rx="5" fill="#FDE68A" stroke="#FCD34D" stroke-width="1"/>
  <text x="705" y="296" text-anchor="middle" font-size="10" fill="#78350F">Q, K ← 纯时间戳特征</text>
  <text x="705" y="308" text-anchor="middle" font-size="10" fill="#78350F">V ← 物品语义特征（复用）</text>
  <rect x="608" y="316" width="194" height="28" rx="5" fill="#FDE68A" stroke="#FCD34D" stroke-width="1"/>
  <text x="705" y="327" text-anchor="middle" font-size="10" fill="#78350F">周期性时序建模</text>
  <text x="705" y="340" text-anchor="middle" font-size="10" fill="#78350F">日内 / 周内 / 季节性模式</text>
  <text x="705" y="360" text-anchor="middle" font-size="10" fill="#F59E0B">语义与时序信号彻底解耦</text>

  <!-- ===== FUSION BLOCK ===== -->
  <!-- Three arrows down to fusion -->
  <line x1="155" y1="367" x2="155" y2="400" stroke="#2563EB" stroke-width="1.5"/>
  <line x1="430" y1="367" x2="430" y2="400" stroke="#10B981" stroke-width="1.5"/>
  <line x1="705" y1="367" x2="705" y2="400" stroke="#F59E0B" stroke-width="1.5"/>
  <!-- Horizontal convergence line -->
  <line x1="155" y1="400" x2="705" y2="400" stroke="#64748B" stroke-width="1.5"/>
  <!-- Down arrow to fusion box -->
  <line x1="430" y1="400" x2="430" y2="418" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Fusion box -->
  <rect x="254" y="418" width="352" height="46" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="430" y="437" text-anchor="middle" font-size="13" font-weight="bold" fill="#6D28D9">拼接 + 门控融合</text>
  <text x="430" y="454" text-anchor="middle" font-size="11" fill="#7C3AED">Concatenation + Gated Mechanism → 自适应加权三通道输出</text>

  <!-- Arrow to MFFN -->
  <line x1="430" y1="464" x2="430" y2="484" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MFFN box -->
  <rect x="304" y="484" width="252" height="38" rx="8" fill="#FFF1F2" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="430" y="499" text-anchor="middle" font-size="13" font-weight="bold" fill="#BE123C">MFFN 多阶段前馈网络</text>
  <text x="430" y="514" text-anchor="middle" font-size="10" fill="#BE123C">Multi-stage Feed-Forward Network</text>

  <!-- Arrow to output -->
  <line x1="430" y1="522" x2="430" y2="532" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output label -->
  <text x="430" y="540" text-anchor="middle" font-size="12" fill="#475569">→ 下一个物品预测 (Next Item Prediction)</text>

  <!-- Complexity badge top-right -->
  <rect x="698" y="75" width="148" height="56" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <text x="772" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">推理复杂度</text>
  <text x="772" y="109" text-anchor="middle" font-size="11" fill="#059669">Prefill: O(nd²)</text>
  <text x="772" y="124" text-anchor="middle" font-size="11" fill="#059669">Decode: O(d²) 固定状态</text>

  <!-- Left info badge -->
  <rect x="14" y="75" width="148" height="56" rx="8" fill="#FEF9C3" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="88" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="#78350F">双模式兼容</text>
  <text x="88" y="109" text-anchor="middle" font-size="11" fill="#92400E">训练: 并行矩阵计算</text>
  <text x="88" y="124" text-anchor="middle" font-size="11" fill="#92400E">推理: RNN 递归展开</text>
</svg>
