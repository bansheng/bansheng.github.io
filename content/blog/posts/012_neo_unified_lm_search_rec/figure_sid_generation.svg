<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1E293B">SID 生成 Pipeline：从物品到语义标识符</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#64748B">NEO · Semantic Identifier Generation via Residual K-means Quantization</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 1: Items (two types) -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Track/Artist items box -->
  <rect x="20" y="80" width="150" height="110" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="95" y="102" text-anchor="middle" font-size="12" font-weight="bold" fill="#1D4ED8">艺术家 / 曲目</text>
  <text x="95" y="118" text-anchor="middle" font-size="10" fill="#3B82F6">Artist / Track</text>
  <!-- Music note icon area -->
  <rect x="36" y="126" width="118" height="50" rx="5" fill="#DBEAFE"/>
  <text x="95" y="143" text-anchor="middle" font-size="18">🎵</text>
  <text x="95" y="165" text-anchor="middle" font-size="10" fill="#1D4ED8">音频信号数据</text>
  <text x="95" y="178" text-anchor="middle" font-size="9" fill="#3B82F6">Audio Waveform</text>

  <!-- Show/Podcast/Audiobook items box -->
  <rect x="20" y="210" width="150" height="110" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="2"/>
  <text x="95" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">节目 / 播客 / 有声书</text>
  <text x="95" y="248" text-anchor="middle" font-size="10" fill="#059669">Show / Podcast / Audiobook</text>
  <rect x="36" y="256" width="118" height="50" rx="5" fill="#D1FAE5"/>
  <text x="95" y="273" text-anchor="middle" font-size="18">📖</text>
  <text x="95" y="295" text-anchor="middle" font-size="10" fill="#065F46">文本元数据</text>
  <text x="95" y="308" text-anchor="middle" font-size="9" fill="#059669">Title / Description</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 2: Embedding Extraction -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Arrows from items to embedding -->
  <line x1="170" y1="135" x2="220" y2="160" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="170" y1="265" x2="220" y2="250" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Embedding extraction box -->
  <rect x="222" y="110" width="148" height="170" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <rect x="222" y="110" width="148" height="30" rx="8" fill="#7C3AED"/>
  <rect x="222" y="128" width="148" height="12" fill="#7C3AED"/>
  <text x="296" y="129" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">嵌入提取</text>

  <!-- Artist sub-box -->
  <rect x="234" y="148" width="124" height="56" rx="6" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1.2"/>
  <text x="296" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">音频频谱嵌入</text>
  <text x="296" y="179" text-anchor="middle" font-size="9" fill="#6D28D9">Track-level aggregation</text>
  <text x="296" y="192" text-anchor="middle" font-size="9" fill="#7C3AED">码本 K=1024</text>

  <!-- Show sub-box -->
  <rect x="234" y="214" width="124" height="56" rx="6" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1.2"/>
  <text x="296" y="231" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">Qwen3 文本嵌入</text>
  <text x="296" y="245" text-anchor="middle" font-size="9" fill="#6D28D9">Qwen3 Embedding (8B)</text>
  <text x="296" y="258" text-anchor="middle" font-size="9" fill="#7C3AED">码本 K=256</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 3: Data Augmentation note -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="222" y="300" width="148" height="44" rx="7" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="296" y="317" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">数据增强</text>
  <text x="296" y="330" text-anchor="middle" font-size="9" fill="#92400E">LLM 生成丰富描述</text>
  <text x="296" y="341" text-anchor="middle" font-size="9" fill="#92400E">HR@10 +2.9%</text>

  <!-- Arrow from embedding to data aug -->
  <line x1="296" y1="280" x2="296" y2="298" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-purple)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 4: Residual K-means Quantization (central, detailed) -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Arrow from embedding to quantization -->
  <line x1="370" y1="195" x2="418" y2="195" stroke="#7C3AED" stroke-width="2.5" marker-end="url(#arrow-purple)"/>

  <!-- Quantization big box -->
  <rect x="420" y="80" width="200" height="290" rx="10" fill="#FDF4FF" stroke="#A855F7" stroke-width="2"/>
  <rect x="420" y="80" width="200" height="34" rx="10" fill="#A855F7"/>
  <rect x="420" y="102" width="200" height="12" fill="#A855F7"/>
  <text x="520" y="101" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">残差 K-means 量化</text>
  <text x="520" y="117" text-anchor="middle" font-size="10" fill="#E9D5FF">Residual K-means Quantization</text>

  <!-- Round 1 -->
  <rect x="434" y="126" width="172" height="52" rx="7" fill="#F3E8FF" stroke="#C084FC" stroke-width="1.5"/>
  <text x="520" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="#6B21A8">第 1 轮量化 → c₁</text>
  <text x="520" y="157" text-anchor="middle" font-size="10" fill="#7E22CE">粗粒度语义类别</text>
  <text x="520" y="170" text-anchor="middle" font-size="9" fill="#9333EA">如「喜剧播客」大类</text>

  <!-- Down arrow -->
  <line x1="520" y1="178" x2="520" y2="194" stroke="#A855F7" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="552" y="190" font-size="9" fill="#9333EA">计算残差</text>

  <!-- Round 2 -->
  <rect x="434" y="196" width="172" height="52" rx="7" fill="#F3E8FF" stroke="#C084FC" stroke-width="1.5"/>
  <text x="520" y="213" text-anchor="middle" font-size="11" font-weight="bold" fill="#6B21A8">第 2 轮量化 → c₂</text>
  <text x="520" y="227" text-anchor="middle" font-size="10" fill="#7E22CE">细分领域</text>
  <text x="520" y="240" text-anchor="middle" font-size="9" fill="#9333EA">如「科技脱口秀」</text>

  <!-- Down arrow -->
  <line x1="520" y1="248" x2="520" y2="264" stroke="#A855F7" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="552" y="260" font-size="9" fill="#9333EA">再次计算残差</text>

  <!-- Round 3+4 -->
  <rect x="434" y="266" width="172" height="52" rx="7" fill="#F3E8FF" stroke="#C084FC" stroke-width="1.5"/>
  <text x="520" y="283" text-anchor="middle" font-size="11" font-weight="bold" fill="#6B21A8">第 3~4 轮量化 → c₃ c₄</text>
  <text x="520" y="297" text-anchor="middle" font-size="10" fill="#7E22CE">精细区分具体物品</text>
  <text x="520" y="310" text-anchor="middle" font-size="9" fill="#9333EA">如「第 42 集」区分</text>

  <!-- M=4 note -->
  <text x="520" y="350" text-anchor="middle" font-size="10" fill="#7C3AED">M=4 层量化 · 逐步精细化</text>
  <text x="520" y="363" text-anchor="middle" font-size="9" fill="#9333EA">从粗粒度到细粒度语义区域</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 5: SID Output -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Arrow from quantization to SID -->
  <line x1="620" y1="195" x2="658" y2="195" stroke="#A855F7" stroke-width="2.5" marker-end="url(#arrow-purple)"/>

  <!-- SID output box -->
  <rect x="660" y="80" width="122" height="290" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <rect x="660" y="80" width="122" height="34" rx="10" fill="#10B981"/>
  <rect x="660" y="102" width="122" height="12" fill="#10B981"/>
  <text x="721" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">语义标识符</text>
  <text x="721" y="115" text-anchor="middle" font-size="10" fill="#A7F3D0">SID Output</text>

  <!-- SID token sequence visual -->
  <rect x="672" y="128" width="98" height="34" rx="6" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1.2"/>
  <text x="721" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">[SID]</text>

  <!-- Token boxes -->
  <rect x="672" y="171" width="22" height="22" rx="4" fill="#2563EB"/>
  <text x="683" y="186" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">c₁</text>

  <rect x="697" y="171" width="22" height="22" rx="4" fill="#3B82F6"/>
  <text x="708" y="186" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">c₂</text>

  <rect x="722" y="171" width="22" height="22" rx="4" fill="#60A5FA"/>
  <text x="733" y="186" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">c₃</text>

  <rect x="747" y="171" width="22" height="22" rx="4" fill="#93C5FD"/>
  <text x="758" y="186" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">c₄</text>

  <rect x="672" y="202" width="98" height="34" rx="6" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1.2"/>
  <text x="721" y="222" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">[/SID]</text>

  <!-- Hierarchy annotation -->
  <rect x="672" y="246" width="98" height="96" rx="6" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="721" y="262" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">层级结构</text>
  <text x="683" y="278" font-size="9" fill="#047857">c₁: 大类</text>
  <text x="683" y="292" font-size="9" fill="#047857">c₂: 细分</text>
  <text x="683" y="306" font-size="9" fill="#047857">c₃: 子类</text>
  <text x="683" y="320" font-size="9" fill="#047857">c₄: 具体</text>
  <text x="683" y="334" font-size="8" fill="#6EE7B7">从粗到细 →</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 6: LLM Vocab Integration -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Arrow from SID down to vocab -->
  <line x1="721" y1="370" x2="721" y2="398" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="630" y="400" width="155" height="80" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.8"/>
  <text x="707" y="420" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">词表融合</text>
  <text x="707" y="436" text-anchor="middle" font-size="10" fill="#059669">V = V_text ∪ V_SID</text>
  <text x="707" y="450" text-anchor="middle" font-size="9" fill="#047857">新增 7,170 个 SID token</text>
  <text x="707" y="462" text-anchor="middle" font-size="9" fill="#6EE7B7">+ [SID] [/SID] 定界符</text>
  <text x="707" y="474" text-anchor="middle" font-size="8" fill="#94A3B8">随机初始化 → 领域对齐阶段学习</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BOTTOM: Key stats panel -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <rect x="20" y="400" width="600" height="96" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="320" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">SID 设计关键参数与消融实验结论</text>

  <!-- Four stat boxes -->
  <rect x="30" y="430" width="130" height="56" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="95" y="448" text-anchor="middle" font-size="10" font-weight="bold" fill="#1D4ED8">原子 ID（破坏语义）</text>
  <text x="95" y="463" text-anchor="middle" font-size="13" font-weight="bold" fill="#EF4444">−59.7%</text>
  <text x="95" y="478" text-anchor="middle" font-size="9" fill="#64748B">HR@10 下降</text>

  <rect x="172" y="430" width="130" height="56" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="237" y="448" text-anchor="middle" font-size="10" font-weight="bold" fill="#1D4ED8">LSH 量化（数据无关）</text>
  <text x="237" y="463" text-anchor="middle" font-size="13" font-weight="bold" fill="#EF4444">−51.2%</text>
  <text x="237" y="478" text-anchor="middle" font-size="9" fill="#64748B">HR@10 下降</text>

  <rect x="314" y="430" width="130" height="56" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="379" y="448" text-anchor="middle" font-size="10" font-weight="bold" fill="#1D4ED8">协同过滤嵌入</text>
  <text x="379" y="463" text-anchor="middle" font-size="13" font-weight="bold" fill="#EF4444">−25.6%</text>
  <text x="379" y="478" text-anchor="middle" font-size="9" fill="#64748B">HR@10 下降</text>

  <rect x="456" y="430" width="154" height="56" rx="6" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="533" y="448" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">NEO 最终方案</text>
  <text x="533" y="463" text-anchor="middle" font-size="13" font-weight="bold" fill="#10B981">+20%～+58%</text>
  <text x="533" y="478" text-anchor="middle" font-size="9" fill="#64748B">HR@10 提升 vs 基线</text>

  <!-- Bottom caption -->
  <text x="400" y="510" text-anchor="middle" font-size="10" fill="#94A3B8">Spotify NEO · arXiv:2603.17533 · 目录规模 &gt;1000 万物品</text>
</svg>
