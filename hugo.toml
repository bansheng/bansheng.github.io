baseURL = 'https://dingyadong.top/'
languageCode = 'zh-cn'
title = "Bansheng's Blog"
theme = 'PaperMod'

[params]
    disableSpecial1stPost = true
    defaultTheme = "light"
    showCodeCopyButtons = true
    description = "Bansheng 的个人技术博客，分享 AI/ML 研究、深度学习推理优化和软件工程实践"
    author = "Bansheng"
    images = []

    [params.profileMode]
        enabled = false

    # Open Graph / Twitter Card
    [params.cover]
        linkFullImages = true

    [params.homeInfoParams]
        Title = "Bansheng's Blog"
        Content = "AI/ML 研究与工程实践"

    [[params.socialIcons]]
        name = "email"
        url = "mailto:dyadongcs@gmail.com"
    [[params.socialIcons]]
        name = "linkedin"
        url = "https://www.linkedin.com/in/yadong-ding-3b2986182/"
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/bansheng"
    
    [params.comments]
        enabled = true
        provider = "giscus"
        
        [params.comments.giscus]
            repo = "bansheng/bansheng.github.io"
            repoId = "MDEwOlJlcG9zaXRvcnkyMzQwMjExOTE="
            category = "General"
            categoryId = "DIC_kwDODfLhR84C4l9B"
            mapping = "pathname"
            strict = "0"
            reactionsEnabled = "1"
            emitMetadata = "0"
            inputPosition = "bottom"
            theme = "preferred_color_scheme"
            lang = "zh-CN"
            loading = "lazy"

[taxonomies]
    tag = "tags"
    category = "categories"

[menu]
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "contact"
    name = "联系我"
    url = "/contact/"
    weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = false
    guessSyntax = true
    lineNos = false
    style = "github"
    noClasses = false

  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block = [['\[', '\]'], ['$$', '$$']]
      inline = [['\(', '\)'], ['$', '$']]
