baseURL: 'https://dingyadong.top/'
title: "Yadong's Blog"
defaultContentLanguage: zh

module:
  imports:
    - path: github.com/HugoBlox/kit/modules/blox
    - path: github.com/HugoBlox/kit/modules/integrations/netlify

pagination:
  pagerSize: 10

enableRobotsTXT: true
disableAliases: true

taxonomies:
  tag: tags
  category: categories

permalinks:
  blog: /posts/:contentbasename/

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - - '\['
              - '\]'
            - - '$$'
              - '$$'
          inline:
            - - '\('
              - '\)'
            - - '$'
              - '$'
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: false
    style: github
    noClasses: false

outputs:
  home:
    - HTML
    - RSS

cascade:
  - _target:
      path: /blog/**
    params:
      reading_time: true
      commentable: true
      share: true
      pager: true
