      - paragraph [ref=e3298]:
        - generic [ref=e3300]: ListCE 损失
      - paragraph [ref=e3301]:
        - generic [ref=e3302]: 为了解决折损 3，需要探索更高效的训练策略。除了调整学习率、batch size 等超参这类基础方案，我们还探索了更高效的 loss 和优化器，首先介绍 loss 部分。相较于 pointwise loss，由于 listwise loss 可以直接优化模型的分类面，因此拥有更高的优化效率，且其形式也更加匹配 user level聚合样本的形式。从各类 listwise loss 中，我们选型 listCE loss 以便更好的兼容值准：
      - img [ref=e3304]
      - generic [ref=e3380]:
        - text: 其中
        - img [ref=e3382]
        - text: 是 sigmoid 函数。通过 listCE loss，我们很大程度回捞了折损。另外 listCE 不但能提升 uauc，还能同等程度的提升 auc，可见并不是利用 user level listwise 的训练形式来 hack 了 uauc 指标，而是真实地学到了更好的表征。
      - paragraph [ref=e3394]:
        - generic [ref=e3395]: Muon 优化器
      - paragraph [ref=e3396]:
        - generic [ref=e3397]:
          - text: 除了更高效的 loss，我们还探索了更高效的优化器。Muon 优化器由于高效的单步迭代效率，更适用于 one-epoch 数据流。Muon 优化器的思路是对 dense 参数的梯度进行主成分均衡：对于某个参数，若原始梯度可以被特征值分解为
          - img [ref=e3399]
          - text: ，则新梯度为
          - img [ref=e3417]
          - text: 。可以看到，缺秩状态的梯度被强制变换到满秩状态，使得梯度的表达能力被充分利用，这是 Muon 优化器高效的来源。考虑到直接进行特征值分解计算开销太大，这里我们也采用牛顿-舒尔茨变换来求近似解。
      - paragraph [ref=e3435]:
        - generic [ref=e3436]:
          - text: 在实际的应用中，我们发现会出现训练不稳定的情况。不同于大模型中规整的参数形态，精排模型中由于存在大量形态差异巨大组件，导致参数的维度，尺寸也有非常大的差异。而 Muon 优化器梯度的 RMS 和尺寸有关，导致大参数和小参数中每个元素更新幅度有着量级上的差距。这会严重影响模型训练的稳定性，训练前期频繁出现报 Nan 的情况。为了解决这个问题，我们将Muon优化器中原生的缩放因子
          - img [ref=e3438]
          - text: 从调整为
          - img [ref=e3469]
          - text: ，用来抵消掉梯度 RMS 中的尺寸相关项，使得 RMS 变成一个尺寸无关的常数。另外，由于模型的 dense 参数是 Muon 和 Adam 混训，我们也对 RMS 做对跨优化器对齐，配合 Adam 热启 - Muon 接棒训练的方式，最终解决了训练报 Nan 的问题。Muon 优化器进一步回捞的数据流的折损。
      - paragraph [ref=e3494]:
        - generic [ref=e3495]: 有了 listCE loss 和 Muon 优化器，我们挽回了样本聚合带来的折损。需要强调的是，loss 和优化器的收益仅用作回捞折损，并不计入序列建模的收益。
      - paragraph [ref=e3496]
