                    - generic [ref=e1814]: ","
                    - generic [ref=e1815]: C
                    - generic [ref=e1816]: ","
                    - generic [ref=e1817]: I
                - text: . We first perform user-level aggregation on the scenario-specific features within their respective local scenarios. These aggregated components are then concatenated column-wise to construct a unified feature representation, which is finally merged with the scenario-agnostic data at the user level. This pipeline effectively circumvents computational redundancy and storage overhead, significantly improving systemic robustness and resource utilization efficiency.
