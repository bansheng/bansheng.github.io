            - paragraph [ref=e2724]:
              - text: To understand how MTFM models scenario-specific characteristics and captures differentiated cross-scenario knowledge, we visualize the attention heatmaps for representative samples in Figure
              - link "5" [ref=e2725] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.11235v2#S4.F5
              - text: ". The horizontal axis denotes T-Tokens across scenarios, while the vertical axis represents H-Tokens. Our observations include: 1) T-Tokens in all scenarios effectively aggregate information from H-Tokens across the entire multi-scenario space. 2) Distinct learning patterns emerge across scenarios; for instance, T-Tokens in HP and SQS exhibit higher attention weights toward their own H-Tokens compared to those of PHF, whereas PHF T-Tokens are more heavily indexed on their corresponding H-Tokens. Overall, the heatmaps reveal distinct block-wise attention patterns, demonstrating that MTFM is not only capable of learning from multi-scenario data but also possesses robust scenario-awareness."
          - generic [ref=e2726]:
            - heading "4.6. Online Experiments (RQ5)" [level=3] [ref=e2727]:
              - generic [ref=e2728]: 4.6.
              - text: Online Experiments (RQ5)
            - paragraph [ref=e2730]: To validate MTFM’s real-world impact, we conducted A/B tests across two major online scenarios. The experimental traffic involved tens of millions of daily exposures, ensuring robust results. The baseline model was the current SOTA model, which has been continuously optimized and deployed for several years.
