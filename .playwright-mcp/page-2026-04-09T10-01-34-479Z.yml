              - paragraph [ref=e1841]: "To enhance the inference efficiency of the MTFM model in large-scale industrial scenarios, we propose a comprehensive optimization framework spanning the sparsity, kernel, and system levels:"
              - paragraph [ref=e1843]: Sparse Matrix Multiplication. Leveraging the Sparse Tensor Cores within the NVIDIA Ampere architecture, we implement 2:4 structured pruning on the linear projection layers (UVQK and Output) of the HSTU module. This technique achieves a 50% reduction in memory footprint and exploits double the theoretical peak throughput for matrix multiplication, significantly reducing latency without sacrificing predictive performance. This optimization yields approximately 10% throughput improvement and reduces inference latency by approximately 0.2ms.
              - paragraph [ref=e1845]: Attention Computation Optimization. To address the irregular sparsity inherent in dynamic masks, we propose a fine-grained computation skipping strategy. This approach dynamically prunes redundant operations stemming from sequence padding and leverages domain-specific constraints to bypass invalid computation (e.g., zero-weight attention from user to target features). This optimization yields approximately 5% throughput improvement.
              - paragraph [ref=e1847]:
                - text: Scenario-aware Deployment and Other Optimizations. Since MTFM is trained across multiple scenarios but deployed on independent sub-scenarios, we decompose the global computational graph into scenario-specific subgraphs. This modularization eliminates redundant operations associated with unnecessary scenario-specific features, thereby optimizing resource utilization. Furthermore, we leverage BF16 half-precision inference and the M-Falcon
                - generic [ref=e1848]:
