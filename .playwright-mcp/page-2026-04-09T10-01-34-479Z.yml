                - paragraph [ref=e157]: "Hybrid Target Attention: We introduce HTA, a novel attention mechanism combining sparse-dense layers and GQA to achieve an optimal trade-off between modeling capacity and computational efficiency."
              - listitem [ref=e158]:
                - text: •
                - paragraph [ref=e160]: "System-Model Co-design: We implement system-level optimizations to ensure the economic viability of MTFM in industrial-scale production."
              - listitem [ref=e161]:
                - text: •
                - paragraph [ref=e163]: "Empirical Validation: Extensive offline and online evaluations at Meituan demonstrate significant gains, proving MTFM’s real-world effectiveness."
