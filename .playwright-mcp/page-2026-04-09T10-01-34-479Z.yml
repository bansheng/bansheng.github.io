          - generic [ref=e2552]:
            - heading "4.2. Overall Performance Comparison (RQ1)" [level=3] [ref=e2553]:
              - generic [ref=e2554]: 4.2.
              - text: Overall Performance Comparison (RQ1)
            - paragraph [ref=e2556]:
              - text: Table
              - link "2" [ref=e2557] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.11235v2#S4.T2
              - text: "presents the main experimental results for three representative scenarios: HP, PHF, and SQS. Several key insights can be drawn. First, RankMixer delivers competitive results among general recommenders by effectively supporting model scaling; it marginally exceeds other baselines on HP while achieving substantial gains on SQS, outperforming MMoE by 0.38pp in CTCVR GAUC and 0.49pp in WRITE GAUC. However, in the PHF setting, its performance remains superior to DCNv2 but trails behind MMoE. Second, multi-scenario methods such as STAR and PEPNet generally outperform general baselines but fall short of generative ranking models like MTGR and OneTrans. Notably, these methods exhibit a pronounced ”see-saw effect”; for instance, PEPNet surpasses RankMixer in HP and PHF but underperforms in the SQS scenario. In contrast, generative models consistently demonstrate superior robustness, with MTGR slightly edging out OneTrans across most metrics. Ultimately, our proposed MTFM model achieves state-of-the-art results across nearly all scenarios and tasks. The consistent dominance of MTFM underscores its capability to not only mitigate the see-saw effect but, more importantly, to capitalize on the scaling law by efficiently leveraging extensive multi-scenario data to further enhance model’s performance."
