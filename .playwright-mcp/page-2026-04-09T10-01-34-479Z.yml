            - text: . However, the true potential of a Recommendation Foundation Model remains untapped as long as models are confined to single-scenario silos. Inspired by the success of multimodal FMs, we argue that the next frontier lies in bridging cross-scenario heterogeneity. By extending from single-scene optimization to a unified multi-scenario framework, we can leverage diverse behavioral signals to further unlock the benefits of Scaling Laws, thereby elevating the performance upper bound and establishing a more scalable paradigm for recommendation.
          - paragraph [ref=e122]: "To realize this vision, we contend that an ideal Recommendation Foundation Model must embody three quintessential properties: Scalability, Extensibility, and Efficiency. First, Scalability requires the model to yield consistent and predictable performance gains as the parameter size and data volume expand. Second, Extensibility dictates that the model can seamlessly adapt to an arbitrary number of existing scenarios or integrate emerging ones with low cost. Finally, Efficiency; the framework must maintain low computational overhead during both training and inference, even when handling the massive data volumes generated across diverse scenarios."
          - paragraph [ref=e124]:
            - text: Existing multi-scenario modeling efforts
            - generic [ref=e125]:
              - text: (Sheng et al.,
              - link "2021a" [ref=e126] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.11235v2#bib.bib19
              - text: ; Shu et al.,
              - link "2024" [ref=e127] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.11235v2#bib.bib21
              - text: ; Zhang et al.,
              - link "2024a" [ref=e128] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.11235v2#bib.bib34
              - text: ; Xiaoyu et al.,
              - link "2025" [ref=e129] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.11235v2#bib.bib27
              - text: )
            - text: primarily follow a ”harmonize-then-decompose” paradigm. These approaches typically aggregate data from multiple scenarios and enforce input homogeneity with a fixed template. Any heterogeneous components must be either discarded or handled through an additional padding operator. Structurally, they rely on disentangling model parameters into domain-invariant and domain-specific components (e.g., via MoE-based architectures
            - generic [ref=e130]:
              - text: (Ma et al.,
              - link "2018a" [ref=e131] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.11235v2#bib.bib15
              - text: ; Fedus et al.,
              - link "2022" [ref=e132] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.11235v2#bib.bib7
              - text: )
            - text: ) to capture shared knowledge while preserving scenario-specific nuances.
          - paragraph [ref=e134]: "However, these conventional paradigms fall short of the aforementioned hallmarks for a foundation model. 1) Rigidity in Extensibility: Industrial recommendations often encompass highly divergent scenarios with heterogeneous feature spaces. For instance, in our food delivery platform, the feature schemas for restaurant recommendation and food recommendations are inherently distinct due to different types of supply and UI presentations. The reliance on strict feature alignment is unsustainable in industrial ecosystems. Forcing hundreds of heterogeneous features into a fixed template is not only error-prone but also leads to significant information loss. 2) Lack of Architectural Scalability: Most existing structures are handcrafted based on expert heuristics to handle a fixed set of scenarios. Such intricate, scenario-tailored designs lack the structural flexibility needed to benefit from the scaling laws observed in other scenarios. 3) Prohibitive Computational Costs: Within the traditional paradigm, training costs increase linearly with data volume. The brute-force integration of massive multi-scenario data leads to exorbitant expenses, rendering the model economically inefficient for real-world deployment."
          - paragraph [ref=e136]: To address these challenges, we present the Meituan Foundation Model (MTFM), a unified framework engineered to satisfy the three quintessential properties. First, to ensure Extensibility, MTFM moves beyond rigid feature templates by abstracting multi-domain inputs into a unified sequence of heterogeneous tokens. This token-based representation allows the model to ingest disparate signals across scenarios without manual alignment or information loss. Building upon this, we employ a transformer-inspired backbone designed for Scalability. By replacing handcrafted heuristic-based structures with a deep self-attention mechanism, MTFM empowers the model to automatically capture both universal behavioral laws and scenario-specific nuances as the model and data scale.
          - paragraph [ref=e138]:
            - text: To achieve superior Efficiency without compromising modeling capacity, we introduce Hybrid Target Attention (HTA). While full-attention backbones excel in expressiveness, their quadratic complexity is prohibitive for industrial-scale long sequences. Inspired by the application of sparse attention in LLMs
            - generic [ref=e139]:
              - text: (Yuan et al.,
              - link "2025" [ref=e140] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.11235v2#bib.bib30
              - text: ; Qwen Team,
              - link "2025" [ref=e141] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.11235v2#bib.bib17
              - text: ; Team et al.,
              - link "2026" [ref=e142] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.11235v2#bib.bib22
              - text: )
            - text: ", HTA serves as a strategic middle ground: it selectively applies full attention to a few critical layers to maintain global dependency capture, while utilizing target attention for the majority of the stack. By further integrating Grouped-Query Attention (GQA)"
            - generic [ref=e143]:
              - text: (Ainslie et al.,
              - link "2023" [ref=e144] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.11235v2#bib.bib2
              - text: )
            - text: ", MTFM significantly compresses the memory footprint and improves the training throughput, enabling the processing of more multi-scenario tokens with minimal overhead."
          - paragraph [ref=e146]: Beyond architectural innovations, we implement a suite of systematic optimizations to bridge the gap between theoretical models and real-world deployment. On the data front, we utilize user-level aggregation from multiple scenarios to transform fragmented samples into dense sequences, substantially boosting training throughput. At the system level, we nearly double both training and inference throughput by eliminating critical bottlenecks through a range of techniques, such as CPU-GPU pipeline orchestration, kernel fusion, and structured sparsity. These co-designs ensure that MTFM is economically viable for large-scale production.
          - paragraph [ref=e148]: "We evaluate the performance of MTFM through both offline experiments and online A/B testing across various scenarios in Meituan. Offline experiments demonstrate that MTFM consistently outperforms state-of-the-art baselines across multiple scenarios and objectives. Specifically, for the CTR (Click-Through Rate) task, MTFM achieves an average GAUC (Grouped Area Under the Curve) improvement of 0.36pp (percentage points), with a maximum gain of 0.76pp. For CTCVR (Click-Through Conversion Rate) tasks, the model yields an average GAUC increase of 0.29pp and a peak improvement of 0.53pp. Furthermore, Real-world online A/B testing shows significant business growth: a +2.98% increase in orders for the Shenqiangshou (SQS) Coupon-Package Recommendation, and a +1.45% boost for the Pinhaofan (PHF) Food Recommendation."
          - generic [ref=e149]:
            - paragraph [ref=e150]: "Our main contributions are summarized as follows:"
            - list [ref=e151]:
              - listitem [ref=e152]:
                - text: •
                - paragraph [ref=e154]: "Unified Foundation Architecture: We propose MTFM, a multi-scenario foundation model that uses heterogeneous tokenization to ensure seamless extensibility and scalability across disparate domains."
              - listitem [ref=e155]:
