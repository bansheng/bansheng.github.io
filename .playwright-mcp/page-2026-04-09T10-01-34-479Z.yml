              - text: represents the total number of blocks. Within each block,
              - math [ref=e2674]:
                - generic [ref=e2676]: K
              - text: and
              - math [ref=e2677]:
                - generic [ref=e2679]: P
              - text: signify the number of Target Attention layers and Full Attention layers, respectively. We further evaluate a special case, Target Attention Only, where the model degenerates into the lazy decoder as seen in OneRecV2
              - generic [ref=e2680]:
                - text: (Zhou et al.,
                - link "2025b" [ref=e2681] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2602.11235v2#bib.bib37
                - text: )
              - text: .
            - paragraph [ref=e2683]:
              - text: We evaluate the impact of varying the ratio between target and full attention layers (Table
              - link "3" [ref=e2684] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.11235v2#S4.T3
              - text: ). The 1:1 and 3:1 configurations maintain or even slightly improve performance relative to full attention while delivering significant gains in both memory efficiency and training throughput. When the sparsity ratio is further increased to 5:1, performance begins to decline by 0.07pp, with the degradation widening to 0.12pp under a pure target attention setup. Additionally, the integration of GQA provides further gains in throughput alongside additional reductions in memory consumption. Finally, our HTA achieves a 2x speedup in training throughput compared to the full attention mechanism.
          - generic [ref=e2685]:
            - heading "4.4. Scalability (RQ3)" [level=3] [ref=e2686]:
              - generic [ref=e2687]: 4.4.
              - text: Scalability (RQ3)
            - paragraph [ref=e2689]: In this section, we systematically evaluate the scalability of MTFM for multi-scenario recommendation (MSR) by examining its performance across varying model scales and training data volumes.
            - generic [ref=e2690]:
              - heading "4.4.1. Scalability with Model Size in MSR" [level=4] [ref=e2691]:
                - generic [ref=e2692]: 4.4.1.
                - text: Scalability with Model Size in MSR
              - paragraph [ref=e2694]:
                - text: "We evaluated its performance across various model scales (ranging from 10x to 70x), using MMoE as the competitive baseline. We employ CTCVR GAUC as the primary metric across three distinct scenarios: SQS, HP, and PHF. As illustrated in Figure"
                - link "4" [ref=e2695] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2602.11235v2#S4.F4
                - text: (a), MTFM exhibits robust scaling laws with consistent slopes across all scenarios, underscoring its superior scalability regarding model capacity in MSR tasks.
            - generic [ref=e2696]:
              - heading "4.4.2. Scalability with Training Data Volumes in MRS" [level=4] [ref=e2697]:
                - generic [ref=e2698]: 4.4.2.
                - text: Scalability with Training Data Volumes in MRS
              - paragraph [ref=e2700]:
                - text: As depicted in Figure
                - link "4" [ref=e2701] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2602.11235v2#S4.F4
                - text: (b), we investigate the impact of the data scale on MTFM by selecting models of three different sizes and observing their performance fluctuations in SQS’s CTCVR GAUC throughout the continual training phase. Empirical results reveal that across all model scales, performance improves consistently as the volume of training tokens increases. In experiments with larger data scales, we further observe that the performance gap between models of different sizes widens gradually as the number of training tokens increases. This robust scaling trend underscores MTFM’s data scalability and demonstrates its ability to consistently convert increased training volumes into performance improvements.
