                - generic [ref=e1820]: 3.3.2.
                - text: Training Optimization
              - paragraph [ref=e1822]: "We conduct comprehensive optimizations to the offline training framework:"
              - paragraph [ref=e1824]: CPU-GPU Pipeline Optimization. In the domain of Large Language Models (LLMs), text undergoes tokenization with all features residing in GPU memory, enabling efficient end-to-end training. In contrast, recommendation systems face substantial feature engineering overhead, with numerous features stored in CPU memory. This architectural discrepancy creates blocking issues between GPU-resident models and CPU-resident features. The feature processing and model fusion pipelines involve extensive Host-Device data synchronization and serial dependencies, introducing multiple synchronization points where the Host must wait for Device-side operations to complete before proceeding. These CPU-GPU pipeline stalls severely degrade overall training performance.
              - paragraph [ref=e1826]: "To address this challenge, we systematically profiled the training framework using CUDA Profiler to identify CPU/GPU blocking bottlenecks. Our optimization strategy encompasses two key aspects: (1) eliminating synchronization points to enable CPU-GPU execution overlap, and (2) optimizing Device-side memory operations to reduce Device-to-Device (D2D) copy overhead. To implement the latter, we optimized frequent tensor indexing and assignment operations by consolidating multiple D2D copy operations into single atomic operations. Experimental results demonstrate that these systemic refinements improve training throughput by 20%."
              - paragraph [ref=e1828]:
                - text: Custom Kernel Development. First, we present an enhanced FlashAttention-2
                - generic [ref=e1829]:
                  - text: (Dao,
                  - link "2023" [ref=e1830] [cursor=pointer]:
                    - /url: https://arxiv.org/html/2602.11235v2#bib.bib5
                  - text: )
                - text: "kernel designed to overcome the limitations of dynamic masking. While existing implementations are primarily optimized for standard causal masks, they often suffer from significant memory inefficiencies due to discontinuous access patterns when handling dynamic masks. To resolve this, we introduce contiguous and aligned mask layouts that facilitate high-throughput asynchronous copying. We also employ a fine-grained shared memory management strategy: we utilize available capacity to cache mask tiles during the forward pass, and implement temporal multiplexing of masks and intermediate tensors during the backward pass. This orchestration effectively overlaps mask-loading latency with the computation pipeline."
              - paragraph [ref=e1832]:
                - text: Furthermore, we implement fused operators for Group Layer Normalization (GLN) and dynamic mask construction using the Triton
                - generic [ref=e1833]:
                  - text: (Tillet et al.,
                  - link "2019" [ref=e1834] [cursor=pointer]:
                    - /url: https://arxiv.org/html/2602.11235v2#bib.bib24
                  - text: )
                - text: . Native PyTorch implementations employ a Gather-Compute-Scatter pattern for GLN and fragmented operations for dynamic mask generation, resulting in excessive kernel launch overhead and inefficient memory access patterns. Leveraging Triton, we eliminate redundant intermediate memory transactions through operator fusion, enhance bandwidth utilization via vectorized memory access, and design group-wise parallel computation schemes to fully exploit GPU parallelism.
              - paragraph [ref=e1836]: Through these kernel-level optimizations, we achieved an additional 57% throughput improvement.
            - generic [ref=e1837]:
              - heading "3.3.3. Inference Optimization" [level=4] [ref=e1838]:
