              - paragraph [ref=e1802]:
                - text: In this section, we delineate the data pipeline design of MTFM. Following the precedent set by MTGR, we utilize user-level sample compression to diminish the cardinality of the training set. We further extend this technique into a multi-scenario user-level compression framework, which is shown in Figure
                - link "3" [ref=e1803] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2602.11235v2#S3.F3
                - text: ". Specifically, we decouple the feature space into two distinct components: scenario-agnostic (shared) features, such as"
                - math [ref=e1804]:
                  - generic [ref=e1806]:
                    - generic [ref=e1807]: H
                    - generic [ref=e1808]: ","
