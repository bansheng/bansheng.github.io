              - text: )
            - text: ", primarily focusing on the expansion of model parameters and data volume within isolated scenarios"
            - generic [ref=e114]:
              - text: (Zhai et al.,
              - link "2024" [ref=e115] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.11235v2#bib.bib31
              - text: ; Zhu et al.,
