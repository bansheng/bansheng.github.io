                - text: "To accommodate the heterogeneous multi-scenario business data proposed in this work, we construct our offline experimental dataset from a real-world industrial food delivery recommendation system (Meituan) using user behavior logs. The dataset comprises three primary recommendation scenarios: Homepage (HP) Restaurant Recommendation, Shenqiangshou(SQS) Coupon-Package Recommendation , and Pinhaofan(PHF) Food Recommendation, with their respective data statistics summarized in Table"
                - link "1" [ref=e1947] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2602.11235v2#S4.T1
                - text: . Specifically, HP serves as the highest-exposure scenario where restaurant cards are recommended to users for order placement, while the SQS and PHF scenarios are food-centric with distinct business objectives (detailed in
                - link "4.1.2" [ref=e1948] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2602.11235v2#S4.SS1.SSS2
                - text: ). Over the past years, these scenarios have been continuously optimized both in business operations and recommendation architecture, making them the focal points for model innovation and industrial impact within Meituan’s ecosystem.
            - generic [ref=e1949]:
              - heading "4.1.2. Metrics & Baselines" [level=4] [ref=e1950]:
                - generic [ref=e1951]: 4.1.2.
                - text: Metrics & Baselines
              - paragraph [ref=e1953]: "We evaluate model performance primarily using AUC (Area Under the Curve) and GAUC (Grouped AUC) to assess prediction quality across diverse scenarios. For HP and PHF, we focus on CTR and CTCVR to measure exposure and conversion effectiveness. In the SQS, we extend our evaluation to include package redemption efficiency via two specialized metrics: IMD (Immediate Redemption within 30 minutes) and WRITE (Redemption within 24 hours)."
              - paragraph [ref=e1955]:
                - text: "To ensure rigorous comparison, we categorize baseline models according to their architecture types: 1) General recommenders including DCNv2"
                - generic [ref=e1956]:
                  - text: (Wang et al.,
                  - link "2021" [ref=e1957] [cursor=pointer]:
                    - /url: https://arxiv.org/html/2602.11235v2#bib.bib25
                  - text: )
                - text: ", MMoE"
                - generic [ref=e1958]:
                  - text: (Ma et al.,
                  - link "2018b" [ref=e1959] [cursor=pointer]:
                    - /url: https://arxiv.org/html/2602.11235v2#bib.bib16
                  - text: )
                - text: ", and RankMixer"
                - generic [ref=e1960]:
                  - text: (Zhu et al.,
                  - link "2025" [ref=e1961] [cursor=pointer]:
                    - /url: https://arxiv.org/html/2602.11235v2#bib.bib38
                  - text: )
                - text: ", which are widely adopted for feature interaction and multi-task learning. 2) Generative Ranking Models, such as MTGR"
                - generic [ref=e1962]:
                  - text: (Han et al.,
                  - link "2025" [ref=e1963] [cursor=pointer]:
                    - /url: https://arxiv.org/html/2602.11235v2#bib.bib10
                  - text: )
                - text: and OneTrans
                - generic [ref=e1964]:
                  - text: (Zhang et al.,
                  - link "2025a" [ref=e1965] [cursor=pointer]:
                    - /url: https://arxiv.org/html/2602.11235v2#bib.bib35
                  - text: )
                - text: ", representing the latest advances in generative sequence modeling. 3) Multi-Scenario Recommendation Models, such as STAR"
                - generic [ref=e1966]:
                  - text: (Sheng et al.,
                  - link "2021b" [ref=e1967] [cursor=pointer]:
                    - /url: https://arxiv.org/html/2602.11235v2#bib.bib20
                  - text: )
                - text: and PEPNet
                - generic [ref=e1968]:
                  - text: (Chang et al.,
                  - link "2023" [ref=e1969] [cursor=pointer]:
                    - /url: https://arxiv.org/html/2602.11235v2#bib.bib4
                  - text: )
                - text: ", which integrate multiple scenarios into a unified framework, allowing adaptive scenario modeling. Notably, models in (1) and (2) are trained on a single-scenario dataset, whereas (3) and (4) leverage a multi-scenario dataset for training."
