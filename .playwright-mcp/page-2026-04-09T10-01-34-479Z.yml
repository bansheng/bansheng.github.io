            - paragraph [ref=e2756]:
              - text: As shown in Table
              - link "4" [ref=e2757] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.11235v2#S4.T4
              - text: ", MTFM delivers consistent performance improvements across all key business metrics. The observed online uplift in orders with MTFM is equivalent to the cumulative gains typically achieved over 2–3 rounds of model iteration in this business domain. In addition, we evaluate the latency of MTFM, where the results indicate that our system optimizations lead to better performance. These results clearly demonstrate that MTFM could deliver direct business value in real-world recommendation systems."
        - generic [ref=e2758]:
          - heading "5. Conclusion" [level=2] [ref=e2759]:
            - generic [ref=e2760]: "5."
            - text: Conclusion
          - paragraph [ref=e2762]: "In this paper, we propose MTFM, a recommendation foundation model that leverages heterogeneous tokenization to achieve a truly alignment-free architecture across diverse domains. Through the co-design of algorithms, training, and deployment systems, MTFM simultaneously embodies the three quintessential properties: Scalability, Extensibility, and Efficiency. Extensive offline evaluations demonstrate significant performance gains, establishing a new scalable paradigm that successfully transcends the limitations of single-scenario silos. Finally, online A/B tests confirm MTFM’s real-world effectiveness, delivering substantial improvements in CTR and conversion volumes in Meituan."
