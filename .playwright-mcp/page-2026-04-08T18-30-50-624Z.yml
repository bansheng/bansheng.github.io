          - paragraph [ref=e2053]: GLUE 平均分从 83.77 提升到 85.69，绝对提升接近 2 个百分点。这一结果证明了 NormFormer 不仅适用于自回归语言模型（GPT 类），对编码器型模型（BERT 类）同样有效，展现了很强的通用性。
          - paragraph [ref=e2054]: MLM 预训练本身的困惑度也从 3.42 降低到 3.31，进一步验证了预训练质量的提升。
