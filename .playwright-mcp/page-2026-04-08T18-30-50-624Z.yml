          - paragraph [ref=e259]: Pre-LN 架构被 GPT-2、GPT-3 等里程碑模型所采用，成为大语言模型预训练的事实标准。它显著改善了训练稳定性，使得大规模模型的训练成为可能。然而，Pre-LN 是否就是完美的解决方案呢？答案是否定的。
          - heading "1.2 Pre-LN 的隐患：反向梯度失配" [level=3] [ref=e260]
          - paragraph [ref=e261]:
            - text: Xiong 等人在 2020 年的研究中首次系统性地揭示了 Post-LN 的梯度问题。然而，NormFormer 的作者们进一步发现，Pre-LN 虽然解决了 Post-LN 的训练不稳定问题，但实际上引入了
            - strong [ref=e262]: 方向相反的梯度失配
            - text: ：
          - list [ref=e263]:
            - listitem [ref=e264]:
              - strong [ref=e265]: Post-LN
              - text: ：后层梯度 » 早层梯度（梯度消失）
            - listitem [ref=e266]:
              - strong [ref=e267]: Pre-LN
              - text: ：早层梯度 » 后层梯度（反向失配）
          - paragraph [ref=e268]:
            - text: 这是什么意思呢？在 Pre-LN 架构中，
            - strong [ref=e269]: 靠近输入端的层获得了过大的梯度信号，而靠近输出端的层反而梯度不足
            - text: 。这种不均衡导致了两个问题：
          - list [ref=e270]:
            - listitem [ref=e271]:
              - strong [ref=e272]: 早期层过度更新
              - text: ：由于梯度过大，早期层的参数在训练初期可能剧烈波动，导致学到的特征不够稳定。
            - listitem [ref=e273]:
              - strong [ref=e274]: 后期层更新不足
              - text: ：深层网络中最靠近输出的层本应承担最重要的任务特定表示学习，但它们接收到的梯度信号却相对不足。
          - paragraph [ref=e275]: 论文通过可视化"第二全连接层权重在不同层的平均 L1 梯度范数"清楚地展示了这一现象（Figure 3）。Pre-LN 的梯度分布呈现明显的递减趋势，与 Post-LN 的递增趋势恰好相反。
          - heading "1.3 研究动机：能否让梯度在所有层间均衡分布？" [level=3] [ref=e276]
          - paragraph [ref=e277]:
            - text: 面对这一发现，NormFormer 论文提出了一个自然而直接的研究问题：
            - strong [ref=e278]: 能否通过在 Transformer 的关键位置添加额外的归一化操作，使得各层的梯度范数趋于均衡？
          - paragraph [ref=e279]: 这个问题的提出源于一个简单但深刻的直觉：归一化操作本质上是对激活值进行重新缩放（rescaling），它天然具备调节梯度流动幅度的能力。如果我们能在正确的位置插入归一化层，就有可能同时解决 Pre-LN 的早层梯度过大和后层梯度过小的问题。
          - paragraph [ref=e280]: 值得一提的是，论文的三位作者（Sam Shleifer、Jason Weston、Myle Ott）均来自 Meta AI，其中 Myle Ott 是 fairseq 框架的核心贡献者。这种工程与理论结合的背景使得 NormFormer 具备极高的工程可行性。
          - separator [ref=e281]
          - heading "2. 算法创新详解：NormFormer 的三大核心设计" [level=2] [ref=e282]
