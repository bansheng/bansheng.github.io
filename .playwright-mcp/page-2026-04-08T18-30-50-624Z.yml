          - paragraph [ref=e1981]:
            - strong [ref=e1982]: 突出亮点：
          - list [ref=e1983]:
            - listitem [ref=e1984]:
              - text: NormFormer-125M 的平均零样本准确率达到 52.3%（基线 50.9%），看似改进不大，但论文指出一个关键发现：NormFormer 达到 GPT-3 Large（1.3B 参数）零样本性能的速度
              - strong [ref=e1985]: 快了 60%
              - text: 。
            - listitem [ref=e1986]: 在 2.7B 规模上，NormFormer 将平均零样本准确率从 66.3% 提升到 68.7%，绝对提升 2.4 个百分点——在这个规模上，这是一个非常可观的改进。
          - paragraph [ref=e1987]: 零样本评估的改进尤为重要，因为它直接反映了预训练质量的提升。更好的预训练表示意味着模型在没有任务特定微调的情况下就能展现更强的通用能力。
