            - strong [ref=e1668]: 这是解决梯度失配的核心机制。
            - text: 论文的 Figure 4 展示了一个极为重要的发现：
            - strong [ref=e1669]: 早期层的 FFN LN gamma 参数系统性地小于后期层的
            - text: 。这意味着 FFN Mid-LayerNorm 自适应地减小了早期层全连接层输入的幅度，从而有效降低了早期层的梯度，缓解了 Pre-LN 固有的"早层梯度过大"问题。
          - paragraph [ref=e1670]:
            - strong [ref=e1671]: 数学直觉：
            - text: 归一化操作通过将激活值映射到零均值、单位方差的分布来工作。当早期层的 FFN 中间激活值幅度较大时，归一化层通过较小的 gamma 参数对其进行压缩，相当于在反向传播时减小了通过这些层的梯度流。这种自适应机制使得模型能够自动学习到最优的梯度分配方案。
