          - paragraph [ref=e1939]: 几个值得注意的发现：
          - paragraph [ref=e1940]:
            - strong [ref=e1941]: 1. 训练加速效果显著。
            - text: NormFormer-1.3B 达到基线相同困惑度的速度
            - strong [ref=e1942]: 快了 24%
            - text: 。也就是说，使用 NormFormer，你只需要原来 76% 的训练时间就能获得相同质量的模型。对于动辄需要数千 GPU 小时的大规模预训练来说，24% 的训练时间节省意味着巨大的计算成本削减。
          - paragraph [ref=e1943]:
            - strong [ref=e1944]: 2. 大模型训练稳定性提升。
            - text: 这可能是 NormFormer 最引人注目的工程价值：
            - strong [ref=e1945]: 基线 2.7B 模型在 6e-4 学习率下训练发散（完全失败），而 NormFormer-2.7B 在相同学习率下可以稳定训练并取得最佳性能
            - text: 。这意味着 NormFormer 显著拓宽了大模型可用学习率的范围，降低了超参数调优的难度。
          - paragraph [ref=e1946]:
            - strong [ref=e1947]: 3. 困惑度改进随模型规模变化。
            - text: 125M 模型上的绝对改进最大（-0.98），而大模型上的绝对改进较小。但考虑到大模型本身的困惑度已经很低（基数效应），相对改进幅度仍然有意义。更重要的是，训练加速和稳定性提升在大模型上同样甚至更加显著。
