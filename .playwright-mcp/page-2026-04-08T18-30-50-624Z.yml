          - separator [ref=e1876]
          - heading "3. 实验结果深度分析" [level=2] [ref=e1877]
          - paragraph [ref=e1878]: NormFormer 论文的实验设计非常全面，涵盖了因果语言模型（CLM）、掩码语言模型（MLM）、零样本评估、消融实验等多个维度。下面我们逐一分析关键实验结果。
          - heading "3.1 学习率搜索：挑战 GPT-3 的默认设置" [level=3] [ref=e1879]
          - paragraph [ref=e1880]:
            - text: 在正式实验之前，论文做了一项非常有价值的预实验：系统性的学习率搜索。结果出人意料地发现，在他们的数据集上，
            - strong [ref=e1881]: 最优学习率比 GPT-3 论文建议的值高出 3-5 倍
            - text: ：
          - table [ref=e1882]:
            - rowgroup [ref=e1883]:
              - row "模型规模 GPT-3 建议学习率 实际最优学习率 倍数" [ref=e1884]:
