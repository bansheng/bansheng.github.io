                - cell "3x" [ref=e1904]
          - paragraph [ref=e1905]:
            - text: 这一发现本身就具有独立的工程价值——它提醒我们不要盲目套用论文中的超参数，
            - strong [ref=e1906]: 针对自己的数据集进行学习率搜索可能带来显著的性能提升
            - text: 。论文使用这些优化后的基线作为对比对象，确保了实验结果的公平性和说服力。
          - heading "3.2 因果语言模型：稳定且一致的困惑度改进" [level=3] [ref=e1907]
          - paragraph [ref=e1908]: 在因果语言模型（Causal Language Model）预训练任务上，NormFormer 在所有模型规模上都取得了一致的困惑度（Perplexity）改进：
